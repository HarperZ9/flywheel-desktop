name: flywheel_desktop
description: "Flywheel Desktop — the native surface for the one platform: routing, verification, lanes, the closed loop, and the projected world."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Hanken Grotesk
      fonts:
        - asset: assets/fonts/hanken-grotesk-light.ttf
          weight: 300
        - asset: assets/fonts/hanken-grotesk-regular.ttf
          weight: 400
        - asset: assets/fonts/hanken-grotesk-italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/hanken-grotesk-medium.ttf
          weight: 500
        - asset: assets/fonts/hanken-grotesk-semibold.ttf
          weight: 600
        - asset: assets/fonts/hanken-grotesk-bold.ttf
          weight: 700
        - asset: assets/fonts/hanken-grotesk-extrabold.ttf
          weight: 800
    - family: Conso
      fonts:
        - asset: assets/fonts/conso-regular.ttf
          weight: 400
        - asset: assets/fonts/conso-regularitalic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/conso-medium.ttf
          weight: 500
        - asset: assets/fonts/conso-semibold.ttf
          weight: 600
        - asset: assets/fonts/conso-bold.ttf
          weight: 700
